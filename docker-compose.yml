version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: taskmanager-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: taskmanager-backend
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/taskmanager
      JWT_SECRET: ${JWT_SECRET:-changeme_use_env_in_production}
      JWT_EXPIRES_IN: 7d
      CLIENT_ORIGIN: http://localhost:5173
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: taskmanager-frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
